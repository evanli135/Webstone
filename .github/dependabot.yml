version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      langchain:
        patterns:
          - "langchain*"
          - "langgraph*"
      observability:
        patterns:
          - "opentelemetry*"
          - "structlog*"
      testing:
        patterns:
          - "pytest*"
          - "ruff*"
          - "pyright*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
